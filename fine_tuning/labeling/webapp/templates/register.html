{% extends "base.html" %}
{% set title = "Register" %}

{% block content %}
<section class="panel narrow">
  <h2>Register with email</h2>
  <p class="muted">We only store your email in the local SQLite database and the session cookie.</p>
  <form method="post" class="stack">
    <label>
      Email
      <input type="email" name="email" placeholder="name@example.com" required autofocus>
    </label>
    <button type="submit">Start labeling</button>
  </form>
</section>
{% endblock %}
